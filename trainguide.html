<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>優先席・車いすスペース案内</title>
<style>
/* ── リセット・ベース ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --surface2: #f0efec;
  --border: rgba(0,0,0,0.10);
  --border2: rgba(0,0,0,0.18);
  --text: #1a1a18;
  --text2: #5f5e5a;
  --text3: #9b9a96;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --green: #1D9E75;
  --green-light: #9FE1CB;
  --green-bg: #E1F5EE;
  --blue: #185FA5;
  --blue-light: #B5D4F4;
  --blue-bg: #E6F1FB;
  --amber: #BA7517;
  --amber-light: #FAC775;
  --amber-bg: #FAEEDA;
  --car-base: #e8e7e2;
  --car-border: #c8c7c2;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --surface: #2a2a28;
    --surface2: #333330;
    --border: rgba(255,255,255,0.10);
    --border2: rgba(255,255,255,0.18);
    --text: #f0efec;
    --text2: #a8a7a2;
    --text3: #6a6966;
    --car-base: #3a3a38;
    --car-border: #555553;
  }
}
body {
  font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}
.app {
  max-width: 640px;
  margin: 0 auto;
  padding: 1.5rem 1rem 4rem;
}

/* ── ヘッダー ── */
.header { margin-bottom: 1.5rem; }
.header h1 {
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 3px;
}
.header p {
  font-size: 13px;
  color: var(--text2);
}

/* ── ステップバー ── */
.step-bar { display: flex; gap: 4px; margin-bottom: 1.5rem; }
.step-seg {
  height: 3px;
  flex: 1;
  border-radius: 2px;
  background: var(--border);
  transition: background 0.3s;
}
.step-seg.done { background: var(--text2); }
.step-seg.active { background: var(--text); }

/* ── カード ── */
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  margin-bottom: 0.875rem;
  animation: fadeUp 0.18s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.sec-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* ── ボタン ── */
.opt-btn {
  display: flex;
  align-items: center;
  gap: 11px;
  width: 100%;
  padding: 11px 13px;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  text-align: left;
  transition: background 0.12s, border-color 0.12s;
  margin-bottom: 6px;
}
.opt-btn:last-child { margin-bottom: 0; }
.opt-btn:hover { background: var(--surface2); border-color: var(--border2); }
.opt-btn:active { transform: scale(0.99); }
.opt-btn.muted { color: var(--text3); cursor: default; }
.opt-btn.muted:hover { background: var(--surface); border-color: var(--border); }
.num-badge {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: var(--text2);
  flex-shrink: 0;
}
.color-dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  border: 0.5px solid var(--border2);
  flex-shrink: 0;
}

/* ── 通知 ── */
.notice {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.65;
  margin-top: 6px;
  animation: fadeUp 0.18s ease both;
}

/* ── 戻るボタン ── */
.back-btn {
  background: none;
  border: none;
  color: var(--text3);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  padding: 0 0 12px;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color 0.12s;
}
.back-btn:hover { color: var(--text); }

/* ── 数字入力 ── */
.digit-row { display: flex; gap: 6px; margin-bottom: 1rem; }
.digit-box {
  width: 46px; height: 54px;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 21px;
  font-weight: 600;
  color: var(--text);
  position: relative;
  flex-shrink: 0;
  transition: border-color 0.15s, background 0.15s;
}
.digit-box.active { border-color: var(--text2); border-width: 1.5px; }
.digit-box.filled { background: var(--surface2); }
.digit-label {
  font-size: 9px;
  color: var(--text3);
  position: absolute;
  bottom: 4px;
  left: 0; right: 0;
  text-align: center;
}
.keypad { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 10px; }
.key-btn {
  padding: 11px 4px;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  text-align: center;
  transition: background 0.1s;
  user-select: none;
}
.key-btn:hover { background: var(--surface2); }
.key-btn:active { transform: scale(0.94); }
.key-btn.del { font-size: 13px; color: var(--text2); }
.key-btn.disabled { opacity: 0.2; pointer-events: none; }
.cand-list { margin-top: 8px; }
.cand-item {
  font-size: 13px;
  color: var(--text2);
  padding: 5px 0;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.cand-item:last-child { border-bottom: none; }
.cand-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }

/* ── 結果 ── */
.result-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  animation: fadeUp 0.2s ease both;
}
.train-name { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 3px; }
.train-meta { font-size: 12px; color: var(--text2); margin-bottom: 1.1rem; }
.badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  margin-left: 6px;
  background: var(--surface2);
  color: var(--text2);
  border: 0.5px solid var(--border);
  font-weight: 400;
  vertical-align: middle;
}
.divider { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }
.info-block { margin-bottom: 1rem; }
.info-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  margin-bottom: 6px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
}
.info-value { font-size: 14px; color: var(--text); line-height: 1.65; }
.info-value.pending { color: var(--text3); font-style: italic; }
.reset-btn {
  margin-top: 1rem;
  padding: 10px 20px;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.12s;
}
.reset-btn:hover { background: var(--surface2); }

/* ── 断面図 ── */
.diagram-wrap { overflow-x: auto; padding: 4px 0 8px; margin-bottom: 4px; }
.direction-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 6px;
  gap: 8px;
}
.dir-label { display: flex; align-items: center; gap: 4px; line-height: 1.3; }
.dir-label.right { text-align: right; flex-direction: row-reverse; }
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 16px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 0.5px solid var(--border);
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.legend-swatch {
  width: 14px; height: 14px;
  border-radius: 3px;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>優先席・車いすスペース案内</h1>
    <p>乗車する路線・車両を選ぶと位置をご案内します</p>
  </div>
  <div class="step-bar" id="stepBar"></div>
  <div id="content"></div>
</div>

<script>

  // ── 横浜高速 ──────────────────────────────────────
  { id:'y500', name:'Y500系', company:'横浜高速鉄道', cars:8,
    bandColor:'#3A8CD4', bandNote:'青・黄色中心',

      {car:1, door:4, type:'wheelchair'},

function buildDiagram(train) {
  const cars = train.cars;
  const isMaru = !!train.marunouchi;
  const CAR_W = 54, CAR_H = 56, GAP = 3;
  const TOTAL_W = cars * CAR_W + (cars - 1) * GAP + 2;
  const SVG_H = CAR_H + 16;

  // 各号車のゾーン判定
  const wcSet = new Set();
  const priSet = new Set();
  if (train.zones) {
    train.zones.forEach(z => {
      if (z.type === 'wheelchair') wcSet.add(z.car);
    });
  }
  if (train.priority_doors === 'all_end') {
    for (let i = 1; i <= cars; i++) priSet.add(i);
  } else if (Array.isArray(train.priority_doors)) {
    train.priority_doors.forEach(p => priSet.add(p.car));
  }

  let rects = '';
  for (let i = 0; i < cars; i++) {
    const carNum = i + 1;
    const x = 1 + i * (CAR_W + GAP);
    const isWC = wcSet.has(carNum);
    const isPri = priSet.has(carNum) && !isWC;

    let fill, stroke;
    if (isWC) { fill = '#B5D4F4'; stroke = '#378ADD'; }
    else if (isPri) { fill = '#9FE1CB'; stroke = '#1D9E75'; }
    else { fill = 'var(--car-base)'; stroke = 'var(--car-border)'; }

    // 丸ノ内線フリースペース表示
    let innerRect = '';
    if (isMaru) {
      if (carNum <= 5) {
        innerRect = `<rect x="${x+2}" y="${SVG_H-CAR_H-2+2}" width="8" height="${CAR_H-4}" rx="2" fill="#B5D4F4" opacity="0.9"/>`;
      } else {
        innerRect = `<rect x="${x+CAR_W-10}" y="${SVG_H-CAR_H-2+2}" width="8" height="${CAR_H-4}" rx="2" fill="#B5D4F4" opacity="0.9"/>`;
      }
    }

    rects += `
      <rect x="${x}" y="${SVG_H - CAR_H - 2}" width="${CAR_W}" height="${CAR_H}" rx="4" fill="${fill}" stroke="${stroke}" stroke-width="1"/>
      ${innerRect}
      <text x="${x + CAR_W/2}" y="${SVG_H - CAR_H/2 - 2 + 4}" text-anchor="middle" font-size="12" font-family="sans-serif" fill="${isWC?'#185FA5':isPri?'#0F6E56':'var(--text2)'}">
        ${carNum}
      </text>
    `;
  }

  const svg = `<svg width="${TOTAL_W}" height="${SVG_H}" viewBox="0 0 ${TOTAL_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg" style="display:block">
    ${rects}
  </svg>`;
  return svg;
}

function buildDirectionRow(cars) {
  const isMaru = cars === 6;
  if (isMaru) {
    return `<div class="direction-row">
      <div class="dir-label">← 池袋方面</div>
      <div class="dir-label right">荻窪・方南町方面 →</div>
    </div>`;
  }
  const right10 = cars === 10
    ? '元町・中華街 / 新木場方面 →'
    : '元町・中華街方面 →';
  return `<div class="direction-row">
    <div class="dir-label">← 飯能・西武秩父<br>和光市・川越市方面</div>
    <div class="dir-label right">${right10}<br>新横浜・海老名・湘南台方面</div>
  </div>`;
}

function buildLegend(train) {
  const isMaru = !!train.marunouchi;
  const hasPri = train.priority_doors && !isMaru;
  const hasWC = train.zones || isMaru;
  let items = [];
  if (hasPri) items.push(`<div class="legend-item"><div class="legend-swatch" style="background:#9FE1CB;border:1px solid #1D9E75"></div>優先席あり</div>`);
  if (hasWC) items.push(`<div class="legend-item"><div class="legend-swatch" style="background:#B5D4F4;border:1px solid #378ADD"></div>車いすスペース / フリースペース</div>`);
  items.push(`<div class="legend-item"><div class="legend-swatch" style="background:#FAC775;border:1px solid #BA7517"></div>ふれあいゾーン（準備中）</div>`);
  items.push(`<div class="legend-item"><div class="legend-swatch" style="background:var(--car-base);border:1px solid var(--car-border)"></div>通常車両</div>`);
  return `<div class="legend">${items.join('')}</div>`;
}

let S = {

  lineId: null,
  method: null,
  digits: [],
  result: null,
  visualCars: null,
  visualPath: [],
  visualNode: null,
};

function getById(id) { return TRAINS.find(t => t.id === id); }
function getCands(ds) { return TRAINS.filter(t => !t.visualOnly && t.partial(ds)); }
function getMatch(ds) { return TRAINS.find(t => !t.visualOnly && t.match(ds)) || null; }

function pushDigit(ch) {
  if (S.digits.length >= 5) return;
  const next = [...S.digits, ch];
  if (getCands(next).length === 0) return;
  S.digits = next;
  const cands = getCands(S.digits);
  const matched = getMatch(S.digits);
  if (matched) { S.result = matched; S.screen = 'result'; }
  else if (cands.length === 1) { S.result = cands[0]; S.screen = 'result'; }
  render();
}
function delDigit() { if (!S.digits.length) return; S.digits = S.digits.slice(0, -1); render(); }

function renderDigit() {
  const cands = getCands(S.digits);
  const allKeys = ['1','2','3','4','5','6','7','8','9','0','Y'];
  const valid = allKeys.filter(k => getCands([...S.digits, k]).length > 0);
  let boxes = '';
  for (let i = 0; i < 5; i++) {
    let cls = 'digit-box'; let v = '';
    if (i < S.digits.length) { cls += ' filled'; v = S.digits[i]; }
    else if (i === S.digits.length) cls += ' active';
    boxes += `<div class="${cls}">${v}<span class="digit-label">${i+1}桁目</span></div>`;
  }
  const rows = [['1','2','3','4','5','6'],['7','8','9','0','Y','⌫']];
  const keys = rows.map(row => row.map(k =>
    k === '⌫'
      ? `<button class="key-btn del" data-dkey="del">⌫</button>`
      : `<button class="key-btn${valid.includes(k)?'':' disabled'}" data-dkey="${k}">${k}</button>`
  ).join('')).join('');
  return `<button class="back-btn" data-goto="method">← 検索方法に戻る</button>
  <div class="card">
    <p class="sec-label">車番を1桁ずつ入力</p>
    <div class="digit-row">${boxes}</div>
    <div class="keypad">${keys}</div>
    ${S.digits.length
      ? `<div class="cand-list"><p style="font-size:11px;color:var(--text3);margin-bottom:5px">候補 ${cands.length}件</p>
          ${cands.map(c=>`<div class="cand-item"><span class="cand-dot"></span>${c.company} ${c.name}${c.note?'（'+c.note+'）':''}</div>`).join('')}</div>`
      : `<p style="font-size:13px;color:var(--text3)">車両側面の番号を1桁ずつ入力してください</p>`}
  </div>`;
}

function renderVisual() {
  if (!S.visualCars) {
    return `<button class="back-btn" data-goto="method">← 検索方法に戻る</button>
    <div class="card">
      <p class="sec-label">両数を選んでください</p>
      <button class="opt-btn" data-vcars="8">8両編成</button>
      <button class="opt-btn" data-vcars="10">10両編成</button>
    </div>`;
  }
  const node = S.visualNode;
  const back = S.visualPath.length === 0 ? '← 両数選択に戻る' : '← 前の質問に戻る';
  const opts = node.opts.map(opt => {
    const dot = opt.color !== undefined
      ? `<span class="color-dot" style="background:${opt.color||'var(--border2)'}"></span>` : '';
    return `<button class="opt-btn" data-vopt='${JSON.stringify(opt)}'>${dot}${opt.label}</button>`;
  }).join('');
  return `<button class="back-btn" data-vback="1">${back}</button>
  <div class="card"><p class="sec-label">${node.q}</p>${opts}</div>`;
}

function renderResultCard(train) {
  const isMaru = !!train.marunouchi;
  const wcText = train.wheelchair_text || '調査中';
  const priText = train.priority_text || '調査中';
  const wcPending = wcText === '調査中';
  const priPending = priText === '調査中';

  const diag = buildDiagram(train);
  const dirRow = buildDirectionRow(train.cars);
  const legend = buildLegend(train);
  const backLabel = isMaru ? '← 路線選択に戻る' : '← 最初からやり直す';
  const backGoto = isMaru ? 'line' : 'method';

  return `<button class="back-btn" data-goto="${backGoto}">${backLabel}</button>
  <div class="result-card">
    <p class="train-name">${train.company} ${train.name}${train.note?`<span class="badge">${train.note}</span>`:''}</p>
    <p class="train-meta">全${train.cars}両編成</p>
    <hr class="divider">
    ${dirRow}
    <div class="diagram-wrap">${diag}</div>
    ${legend}
    <hr class="divider">
    <div class="info-block">
      <p class="info-label">車いすスペース / フリースペース</p>
      <div class="info-value${wcPending?' pending':''}">${wcText.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="info-block">
      <p class="info-label">優先席</p>
      <div class="info-value${priPending?' pending':''}">${priText}</div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// メイン描画 & イベント
// ═══════════════════════════════════════════════════════

function render() {
  renderStepBar();
  const el = document.getElementById('content');
  if (S.screen === 'line')        el.innerHTML = renderLine();
  else if (S.screen === 'method') el.innerHTML = renderMethod();
  else if (S.screen === 'digit')  el.innerHTML = renderDigit();
  else if (S.screen === 'visual') el.innerHTML = renderVisual();
  else if (S.screen === 'marunouchi') el.innerHTML = renderResultCard(MARUNOUCHI);
  else if (S.screen === 'result') el.innerHTML = renderResultCard(S.result);
  bindEvents();
}

function bindEvents() {
  document.querySelectorAll('[data-goto]').forEach(el => {
    el.addEventListener('click', () => {
      const g = el.dataset.goto;
      if (g === 'line')   { S = { screen:'line', lineId:null, method:null, digits:[], result:null, visualCars:null, visualPath:[], visualNode:null }; }
      else if (g === 'method') { S = { ...S, screen:'method', digits:[], result:null, visualCars:null, visualPath:[], visualNode:null }; }
      else if (g === 'digit')  { S = { ...S, screen:'digit', method:'digit', digits:[], result:null }; }
      else if (g === 'visual') { S = { ...S, screen:'visual', method:'visual', visualCars:null, visualPath:[], visualNode:null }; }
      else if (g === 'marunouchi') { S = { ...S, screen:'marunouchi' }; }
      if (el.dataset.line) S.lineId = el.dataset.line;
      render();
    });
  });
  document.querySelectorAll('[data-dkey]').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.dkey;
      if (k === 'del') delDigit(); else pushDigit(k);
    });
  });
  document.querySelectorAll('[data-vcars]').forEach(el => {
    el.addEventListener('click', () => {
      S.visualCars = parseInt(el.dataset.vcars);
      S.visualPath = [];
      S.visualNode = S.visualCars === 8 ? VISUAL_8 : VISUAL_10;
      render();
    });
  });
  document.querySelectorAll('[data-vopt]').forEach(el => {
    el.addEventListener('click', () => {
      const opt = JSON.parse(el.dataset.vopt);
      if (opt.result) { S.result = getById(opt.result); S.screen = 'result'; }
      else if (opt.next) { S.visualPath.push(S.visualNode); S.visualNode = opt.next; }
      render();
    });
  });
  document.querySelectorAll('[data-vback]').forEach(el => {
    el.addEventListener('click', () => {
      if (S.visualPath.length > 0) S.visualNode = S.visualPath.pop();
      else { S.visualCars = null; S.visualNode = null; }
      render();
    });
  });
}

render();
</script>
</body>
</html>
